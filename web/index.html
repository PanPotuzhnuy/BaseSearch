<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <title>Base Search</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <!-- Icon sprite: thin-stroke monochrome SVGs reused via <use>. No emoji. -->
    <svg width="0" height="0" class="sprite" aria-hidden="true" focusable="false">
      <defs>
        <symbol id="i-logo" viewBox="0 0 24 24">
          <path d="M5 7.5 12 4l7 3.5v9L12 20l-7-3.5z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          <path d="M5 7.5 12 11l7-3.5M12 11v9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" opacity=".55"/>
        </symbol>
        <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="m20 20-3.6-3.6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
        <symbol id="i-filter" viewBox="0 0 24 24"><path d="M4 6h16M7 12h10M10 18h4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
        <symbol id="i-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.4" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M3.6 12h16.8M12 3.6c2.4 2.3 2.4 14.5 0 16.8M12 3.6c-2.4 2.3-2.4 14.5 0 16.8" fill="none" stroke="currentColor" stroke-width="1.2"/></symbol>
        <symbol id="i-export" viewBox="0 0 24 24"><path d="M12 4v10m0 0 3.4-3.4M12 14l-3.4-3.4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 16.5V19h14v-2.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
        <symbol id="i-refresh" viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.3-5.6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M18 4v3.4h-3.4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></symbol>
        <symbol id="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
        <symbol id="i-moon" viewBox="0 0 24 24"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.3 6.3 0 0 0 10.5 10.5z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></symbol>
        <symbol id="i-left" viewBox="0 0 24 24"><path d="M14 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></symbol>
        <symbol id="i-right" viewBox="0 0 24 24"><path d="M10 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></symbol>
        <symbol id="i-close" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></symbol>
        <symbol id="i-copy" viewBox="0 0 24 24"><rect x="8.5" y="8.5" width="11" height="11" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M5.5 15.5h-1A1.5 1.5 0 0 1 3 14V4.5A1.5 1.5 0 0 1 4.5 3H14a1.5 1.5 0 0 1 1.5 1.5v1" fill="none" stroke="currentColor" stroke-width="1.4"/></symbol>
        <symbol id="i-company" viewBox="0 0 24 24"><path d="M4 20V6.5L12 4l8 2.5V20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M3 20h18M8 9h2M8 12.5h2M8 16h2M14 9h2M14 12.5h2M14 16h2" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></symbol>
        <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.4" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M12 11v5M12 8h.01" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></symbol>
        <symbol id="i-sort" viewBox="0 0 24 24"><path d="M8 4v16m0 0-3-3m3 3 3-3M16 20V4m0 0-3 3m3-3 3 3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></symbol>
        <symbol id="i-x" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></symbol>
      </defs>
    </svg>

    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"><svg class="ic"><use href="#i-logo"/></svg></span>
          <span class="brand-text">
            <span class="brand-title">Base Search</span>
            <span class="brand-sub"><span class="live-dot" id="live-dot"></span><span id="db-status" data-i18n="db_rows">Local database</span></span>
          </span>
        </div>

        <form class="search" id="search-form" role="search">
          <svg class="ic search-ic"><use href="#i-search"/></svg>
          <input id="q" name="text" autocomplete="off" spellcheck="false"
                 data-i18n-ph="search_hint"
                 placeholder="Search product, company, SKU, invoice number, brand..." />
          <button class="btn-clear-q" id="clear-q" type="button" aria-label="Clear" hidden><svg class="ic"><use href="#i-x"/></svg></button>
          <button class="btn primary" id="search-btn" type="submit" data-i18n="find">Search</button>
        </form>

        <div class="top-actions">
          <label class="lang-wrap" title="Language">
            <svg class="ic"><use href="#i-globe"/></svg>
            <select id="lang-select" aria-label="Language"></select>
          </label>
          <button class="icon-btn" id="theme-toggle" type="button" title="Toggle light / dark theme" aria-label="Theme"><svg class="ic"><use href="#i-moon"/></svg></button>
          <span class="vsep"></span>
          <button class="icon-btn" id="export-btn" type="button" title="Export this page to CSV" aria-label="Export"><svg class="ic"><use href="#i-export"/></svg></button>
          <button class="icon-btn spin-host" id="refresh-btn" type="button" title="Refresh data" aria-label="Refresh"><svg class="ic spin-ic"><use href="#i-refresh"/></svg></button>
        </div>
      </header>

      <main class="workbench">
        <button class="filters-toggle" id="filters-toggle" type="button" aria-label="Filters">
          <svg class="ic"><use href="#i-filter"/></svg><span data-i18n="filters">Filters</span><span class="filters-count" id="filters-count" hidden>0</span>
        </button>

        <aside class="filters" id="filters">
          <div class="side-head">
            <svg class="ic"><use href="#i-filter"/></svg><span data-i18n="filters">Filters</span>
          </div>
          <div class="filter-fields" id="filter-fields"></div>
          <button class="btn ghost block" id="clear-filters" type="button" data-i18n="clear_filters">Reset filters</button>
        </aside>

        <section class="main-panel">
          <nav class="tabs">
            <button class="tab active" data-tab="results" type="button" data-i18n="results_tab">Results</button>
            <button class="tab" data-tab="analytics" type="button" data-i18n="analytics">Analytics</button>
            <span class="tab-meta" id="tab-meta"></span>
          </nav>

          <div class="active-filters" id="active-filters" hidden></div>

          <section class="tab-panel active" id="results-panel">
            <div class="panel-head">
              <div class="panel-meta" id="results-meta">—</div>
              <div class="pager">
                <button class="icon-btn sm" id="prev-page" type="button" aria-label="Previous"><svg class="ic"><use href="#i-left"/></svg></button>
                <span class="page-label" id="page-label">1</span>
                <button class="icon-btn sm" id="next-page" type="button" aria-label="Next"><svg class="ic"><use href="#i-right"/></svg></button>
              </div>
            </div>
            <div class="table-wrap" id="results-wrap">
              <table class="grid" id="results-table"><thead></thead><tbody></tbody></table>
              <div class="placeholder" id="results-placeholder"></div>
            </div>
          </section>

          <section class="tab-panel" id="analytics-panel">
            <div class="panel-head">
              <nav class="subtabs" id="analytics-subtabs">
                <button class="chip active" data-group="overview" type="button" data-i18n="tab_overview">Overview</button>
                <button class="chip" data-group="companies" type="button" data-i18n="companies_section">Companies</button>
                <button class="chip" data-group="goods" type="button" data-i18n="products_section">Goods</button>
                <button class="chip" data-group="countries" type="button" data-i18n="countries_section">Countries</button>
                <button class="chip" data-group="prices" type="button" data-i18n="prices_section">Prices</button>
                <button class="chip" data-group="pivot" type="button">Pivot</button>
              </nav>
              <select class="mini-select" id="analytics-limit" title="Top N">
                <option value="10">Top 10</option>
                <option value="25">Top 25</option>
                <option value="50">Top 50</option>
              </select>
            </div>
            <div class="analytics-scroll" id="analytics-scroll">
              <div class="placeholder" data-i18n="analytics_hint">Enter a query or filter to build analytics.</div>
            </div>
          </section>
        </section>
      </main>
    </div>

    <!-- Slide-in drawer: record card / company profile -->
    <div class="scrim" id="scrim" hidden></div>
    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-head">
        <div class="drawer-titles">
          <div class="drawer-title" id="drawer-title">—</div>
          <div class="drawer-sub" id="drawer-sub"></div>
        </div>
        <button class="icon-btn" id="drawer-close" type="button" aria-label="Close"><svg class="ic"><use href="#i-close"/></svg></button>
      </div>
      <div class="drawer-body" id="drawer-body"></div>
    </aside>

    <!-- Group explorer modal: full drill-down list -->
    <div class="modal-scrim" id="modal-scrim" hidden>
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <div class="modal-title" id="modal-title">—</div>
          <div class="modal-search">
            <svg class="ic"><use href="#i-search"/></svg>
            <input id="modal-search" autocomplete="off" data-i18n-ph="group_search_hint" placeholder="Search in list…" />
          </div>
          <button class="btn ghost sm" id="modal-copy" type="button"><svg class="ic"><use href="#i-copy"/></svg><span data-i18n="copy_visible">Copy</span></button>
          <button class="icon-btn" id="modal-close" type="button" aria-label="Close"><svg class="ic"><use href="#i-close"/></svg></button>
        </div>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <div class="toast" id="toast" hidden></div>
    <div class="busy-bar" id="busy-bar" hidden><span></span></div>

    <script src="/assets/app.js"></script>
  </body>
</html>
